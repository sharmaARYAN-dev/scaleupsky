<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#1a73e8" />
    <!-- Logo for Google search (SVG with brand color) -->
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="apple-mobile-web-app-title" content="ScaleUpSky" />

    <!-- Primary SEO Meta -->
    <title>ScaleupSky</title>
    <meta name="description" content="ScaleupSky helps businesses automate operations with AI chatbots, WhatsApp automation, workflow automation, CRM integrations and custom AI solutions." />
    <meta name="keywords" content="AI Automation, WhatsApp Automation, Workflow Automation, Business Automation, CRM Integration, AI Chatbot, AI Agency, Goa, India, ScaleupSky" />
    <meta name="author" content="ScaleupSky" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://scaleupsky.com/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://scaleupsky.com/" />
    <meta property="og:title" content="ScaleUpSky | Enterprise AI Agents & Business Automation" />
    <meta property="og:description" content="ScaleUpSky designs and deploys custom AI agents and business automation pipelines to eliminate manual work, increase conversions, and scale operations." />
    <meta property="og:image" content="https://scaleupsky.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="ScaleUpSky - Enterprise AI Automation" />
    <meta property="og:site_name" content="ScaleUpSky" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://scaleupsky.com/" />
    <meta name="twitter:title" content="ScaleUpSky | Enterprise AI Agents & Business Automation" />
    <meta name="twitter:description" content="Custom AI agents and business automation pipelines that eliminate manual work and scale operations." />
    <meta name="twitter:image" content="https://scaleupsky.com/og-image.png" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Schema.org JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "ScaleUpSky",
      "alternateName": "ScaleUpSky AI",
      "url": "https://scaleupsky.com",
      "logo": {
        "@type": "ImageObject",
        "url": "https://scaleupsky.com/logo.svg",
        "width": 512,
        "height": 512
      },
      "image": "https://scaleupsky.com/logo.svg",
      "description": "ScaleUpSky designs and deploys custom AI agents and business automation pipelines to eliminate manual work, increase conversions, and scale operations.",
      "foundingDate": "2024",
      "sameAs": [
        "https://linkedin.com/company/scaleupsky",
        "https://twitter.com/scaleupsky",
        "https://instagram.com/scaleupsky"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "sales",
        "availableLanguage": ["English"],
        "areaServed": "Worldwide"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
